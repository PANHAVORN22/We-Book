<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img"
    aria-labelledby="title desc">
    <title id="title">Northbound Atlas</title>
    <desc id="desc">Cover art for Northbound Atlas.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0ea5e9" />
            <stop offset="1" stop-color="#1e293b" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#bg)" />
    <rect x="40" y="52" width="520" height="796" rx="28" fill="#0f172a" opacity="0.35" />
    <text x="300" y="240" text-anchor="middle" font-family="serif" font-size="52" fill="#e0f2fe">
        Northbound
    </text>
    <text x="300" y="310" text-anchor="middle" font-family="serif" font-size="52" fill="#e0f2fe">
        Atlas
    </text>
    <line x1="180" y1="410" x2="420" y2="410" stroke="#bae6fd" stroke-width="3" />
    <text x="300" y="500" text-anchor="middle" font-family="serif" font-size="26" fill="#e0f2fe">
