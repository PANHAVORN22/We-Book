<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img"
    aria-labelledby="title desc">
    <title id="title">Signal in the Dust</title>
    <desc id="desc">Cover art for Signal in the Dust.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#b45309" />
            <stop offset="1" stop-color="#1e3a8a" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#bg)" />
    <rect x="36" y="56" width="528" height="788" rx="28" fill="#1f2937" opacity="0.35" />
    <text x="300" y="220" text-anchor="middle" font-family="serif" font-size="34" fill="#fef3c7">
        Signal in the Dust
    </text>
    <text x="300" y="300" text-anchor="middle" font-family="serif" font-size="24" fill="#fde68a">
        A buried message
    </text>
    <line x1="160" y1="420" x2="440" y2="420" stroke="#fbbf24" stroke-width="3" />
    <text x="300" y="520" text-anchor="middle" font-family="serif" font-size="28" fill="#fef3c7">
        Marcus Hale
    </text>
</svg>